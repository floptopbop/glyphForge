<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>ASCII Water</title>
<style>
body {
    margin: 0;
    background: #21323d;
    color: #62c0ff;
    overflow: hidden;
    font-family: "Noto Sans", "math", monospace;
}
pre {
    margin: 0;
    line-height: 1em;
    font-size: 9px;
    user-select: none;
    width: 100vw;
    height: 100dvh;
}
</style>
</head>
<body>
<pre id="screen"></pre>
<script>

const screen = document.getElementById("screen");

const W = Math.floor(window.innerWidth / 5.5);
const H = Math.floor(window.innerHeight / 9);
const chars = "·░.◦▓◌○◍◉●";

let current  = Array.from({length:H}, () => new Float32Array(W));
let previous = Array.from({length:H}, () => new Float32Array(W));
let next     = Array.from({length:H}, () => new Float32Array(W));

// --- WHALE ---
const whale = {
    x:          -10,
    y:          H * 0.5,
    speedX:     0.04,
    sinT:       0,
    sinFreq:    0.006,
    sinAmp:     H * 0.06,   // subtle undulation while hidden
    len:        9,
    surfaceIn:  300 + Math.floor(Math.random() * 400),  // first appearance
    surfacing:  0,          // countdown while visible
};

function updateWhale() {
    whale.sinT += whale.sinFreq;
    whale.x    += whale.speedX;

    if (whale.x > W + whale.len) {
        whale.x      = -whale.len;
        whale.y      = H * (0.2 + Math.random() * 0.6);
        // reset surface timer on each new pass
        whale.surfaceIn = 400 + Math.floor(Math.random() * 500);
    }

    // trigger a surface event
    whale.surfaceIn--;
    if (whale.surfaceIn <= 0 && whale.surfacing <= 0) {
        whale.surfacing = 60;  // visible for ~1 second
        whale.surfaceIn = 999; // won't surface again this pass
    }
    if (whale.surfacing > 0) whale.surfacing--;

    const visible = whale.surfacing > 0;

    // body cells
    whale.cells = [];
    for (let i = 0; i < whale.len; i++) {
        let bx = Math.round(whale.x - i);
        let by = Math.round(whale.y + Math.sin(whale.sinT - i * 0.35) * whale.sinAmp);
        if (bx > 0 && bx < W-1 && by > 0 && by < H-1) {
            whale.cells.push({x: bx, y: by, i, visible});
        }
    }

    // wake — always there, even when invisible. that's the spooky part.
    if (whale.cells.length > 0) {
        const head = whale.cells[0];
        if (visible) {
            // breach — big surface burst
            for (let dy = -4; dy <= 4; dy++) {
                for (let dx = -5; dx <= 5; dx++) {
                    let px = head.x+dx, py = head.y+dy;
                    if (px>0&&px<W-1&&py>0&&py<H-1) current[py][px] += 12 * (1 - Math.abs(dx)/6);
                }
            }
        } else {
            // submerged — just a ghost pressure ripple from the head
            for (let dy = -1; dy <= 1; dy++) {
                let py = head.y + dy;
                if (head.x>0&&head.x<W-1&&py>0&&py<H-1) current[py][head.x] += 0.9;
            }
        }
    }
}

// --- PHYSICS ---
function ripple() {
    for (let y = 1; y < H-1; y++) {
        const cRow = current[y];
        const pRow = previous[y];
        const nRow = next[y];
        for (let x = 1; x < W-1; x++) {
            let v = (current[y-1][x] + current[y+1][x] + cRow[x-1] + cRow[x+1]) / 2 - pRow[x];
            let d = 0.99;
            let e = Math.min(Math.min(x, W-1-x), Math.min(y, H-1-y));
            if (e < 8) d *= 0.85 + (e/8)*0.15;
            nRow[x] = v * d;
        }
    }
    let tmp = previous; previous = current; current = next; next = tmp;
}

// --- RENDER ---
function render() {
    const whaleCells = new Set();
    if (whale.cells) {
        for (const c of whale.cells) {
            if (c.visible) whaleCells.add(c.x + c.y * W);
        }
    }

    let out = "";
    for (let y = 0; y < H; y++) {
        const row = current[y];
        for (let x = 0; x < W; x++) {
            if (whaleCells.has(x + y * W)) {
                out += "◉";
            } else {
                let idx = Math.floor(((row[x]+5)/20)*chars.length);
                if (idx < 0) idx = 0;
                if (idx > chars.length-1) idx = chars.length-1;
                out += chars[idx];
            }
        }
        out += "\n";
    }
    screen.textContent = out;
}

// --- LOOP ---
function animate() {
    updateWhale();
    ripple();
    render();
    requestAnimationFrame(animate);
}
animate();

// --- INPUT ---
function splash(cx, cy) {
    for (let dy = -3; dy <= 3; dy++) {
        for (let dx = -3; dx <= 3; dx++) {
            let px = cx+dx, py = cy+dy;
            if (px>0&&px<W-1&&py>0&&py<H-1) current[py][px] = 18;
        }
    }
}
document.addEventListener("pointerdown", e => {
    splash(Math.floor(e.clientX/window.innerWidth*W), Math.floor(e.clientY/window.innerHeight*H));
});
document.addEventListener("pointermove", e => {
    if (e.buttons) splash(Math.floor(e.clientX/window.innerWidth*W), Math.floor(e.clientY/window.innerHeight*H));
});

</script>
</body>
</html>
